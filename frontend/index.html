<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Orbit</title>
  <meta name="description" content="Entre na sua conta Orbit ou crie um novo perfil personalizado.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="wallpaper-bg" style="background: radial-gradient(ellipse at 60% 40%, #1c0e30 0%, #0a0a0a 70%);"></div>
  <div class="container">
    <div id="auth-container" class="main-card auth-card">
      <div class="auth-header">
        <img src="/favicon.png" alt="Logo Orbit" class="auth-logo">
        <h1 id="auth-title">Bem-vindo</h1>
        <p id="auth-subtitle">Entre na sua conta para continuar</p>
      </div>

      <form id="auth-form">
        <div class="form-group">
          <label for="username">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Usuário
          </label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="Seu nome de usuário" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Senha
          </label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Sua senha secreta" required autocomplete="current-password">
          </div>
        </div>

        <div id="password-strength-container" style="display: none; margin-top: 1rem;">
          <p style="font-size: 0.8rem; margin-bottom: 0.5rem; opacity: 0.7;">A senha deve conter:</p>
          <ul class="strength-list">
            <li id="strength-length">8+ caracteres</li>
            <li id="strength-uppercase">1 letra maiúscula</li>
            <li id="strength-lowercase">1 letra minúscula</li>
            <li id="strength-number">1 número</li>
            <li id="strength-special">1 caractere especial (@$!%*?&)</li>
          </ul>
        </div>

        <button type="submit" id="submit-btn">Entrar</button>
      </form>

      <!-- Google OAuth button — uncomment after setting up credentials in .env -->
      <div class="auth-divider"><span>ou</span></div>
      <a href="/api/auth/google" class="google-btn" id="google-signin-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        Continuar com Google
      </a>

      <button class="link-btn" id="toggle-auth">Não tem uma conta? Registre-se</button>
      <div id="message"></div>
    </div>
  </div>
  <script src="/js/validators.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
